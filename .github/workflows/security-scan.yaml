name: LLM Security Review

on:
  pull_request_target:
    branches: [main, develop]

jobs:
  llm-security-scan:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      id-token: write

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR head
        run: git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head

      - name: Get PR diff
        id: diff
        run: |
          git diff HEAD...pr-head \
            -- '*.go' '*.yaml' '*.yml' '*.json' '*.toml' \
            ':!vendor' ':!go.sum' \
            > pr_diff.txt
          echo "diff_size=$(wc -c < pr_diff.txt)" >> $GITHUB_OUTPUT

      - name: Skip if diff is empty
        if: steps.diff.outputs.diff_size == '0'
        run: echo "No relevant code changes found. Skipping security scan."

      - name: Configure AWS credentials
        if: steps.diff.outputs.diff_size != '0'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711387134148:role/github-llm-security-scan
          aws-region: us-west-2

      - name: Run LLM Security Analysis
        if: steps.diff.outputs.diff_size != '0'
        id: analysis
        run: |
          pip install -q boto3
          python3 << 'PYEOF'
          import os, json, sys, boto3

          with open("pr_diff.txt") as f:
              diff = f.read()

          if not diff.strip():
              print("Empty diff, nothing to analyze.")
              sys.exit(0)

          max_chars = 30000
          truncated = False
          if len(diff) > max_chars:
              diff = diff[:max_chars]
              truncated = True

          prompt = f"""You are a security code reviewer for a Kubernetes network policy agent written in Go.
          This project enforces eBPF-based network policies on EKS clusters.

          Analyze this PR diff for security vulnerabilities.

          Focus on:
          - Command injection or unsafe exec calls
          - Unsafe handling of user-supplied Kubernetes resource fields
          - Privilege escalation in RBAC or container security contexts
          - Sensitive data exposure (secrets, tokens, credentials in logs or env)
          - Insecure file permissions or path traversal
          - Race conditions in concurrent reconciliation or eBPF map access
          - Unsafe deserialization or input parsing
          - Missing error handling that could leak state
          - Insecure network configurations or policy bypass vectors

          For each issue found, provide:
          1. Severity: CRITICAL / HIGH / MEDIUM / LOW
          2. File and line reference from the diff
          3. Description of the vulnerability
          4. Recommended fix with a code snippet if applicable

          If no issues found, respond with exactly: "No security issues detected."

          {"Note: diff was truncated to fit token limits." if truncated else ""}

          PR Diff:
          ```
          {diff}
          ```"""

          client = boto3.client("bedrock-runtime", region_name="us-west-2")
          response = client.invoke_model(
              modelId="us.anthropic.claude-sonnet-4-6",
              contentType="application/json",
              accept="application/json",
              body=json.dumps({
                  "anthropic_version": "bedrock-2023-05-31",
                  "max_tokens": 4096,
                  "messages": [{"role": "user", "content": prompt}]
              }),
          )

          body = json.loads(response["body"].read())
          analysis = body["content"][0]["text"]

          with open("security_analysis.md", "w") as f:
              f.write("## 🔒 LLM Security Review\n\n")
              f.write(analysis)
              if truncated:
                  f.write("\n\n---\n⚠️ *Diff was truncated. Large PRs may have unreviewed sections.*\n")

          has_issues = "no security issues detected" not in analysis.lower()
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              gh.write(f"has_issues={'true' if has_issues else 'false'}\n")

          print(analysis)
          PYEOF

      - name: Comment PR with results
        if: steps.diff.outputs.diff_size != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('security_analysis.md', 'utf8');

            const marker = '<!-- llm-security-review -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            const commentBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

      - name: Fail if security issues found
        if: steps.analysis.outputs.has_issues == 'true'
        run: |
          echo "::error::Security issues were detected. See the PR comment for details."
          exit 1
